<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZY Market</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f7fb;
}

header{
    background:#2563eb;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<header>EZY Market</header>

<div class="container">

<div class="card">
<h2>Welcome</h2>
<p>Site is working ✅</p>
</div>

<div class="card">
<h2>Products</h2>
<p>Products will appear here</p>
</div>

<div class="card">
<h2>Basket</h2>
<button onclick="addItem()">Add Test Item</button>
<p id="basket"></p>
</div>

</div>

<script>
let count = 0;

function addItem(){
    count++;
    document.getElementById("basket").innerText = "Items: " + count;
}
</script>

</body>
</html>
